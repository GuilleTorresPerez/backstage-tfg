app:
  title: Scaffolded Backstage App
  baseUrl: http://localhost:3000

organization:
  name: My Company

backend:
  # Used for enabling authentication, secret is shared by all backend plugins
  # See https://backstage.io/docs/auth/service-to-service-auth for
  # information on the format
  # auth:
  #   keys:
  #     - secret: ${BACKEND_SECRET}
  baseUrl: http://localhost:7007
  logger:
    level: warn
  listen:
    port: 7007
    # Uncomment the following host directive to bind to specific interfaces
    # host: 127.0.0.1
  csp:
    connect-src: ["'self'", 'http:', 'https:']
    # Content-Security-Policy directives follow the Helmet format: https://helmetjs.github.io/#reference
    # Default Helmet Content-Security-Policy values can be removed by setting the key to false
  cors:
    origin: http://localhost:3000
    methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
    credentials: true
  # This is for local development only, it is not recommended to use this in production
  # The production database configuration is stored in app-config.production.yaml
  database:
    client: better-sqlite3
    connection: ':memory:'
  # workingDirectory: /tmp # Use this to configure a working directory for the scaffolder, defaults to the OS temp-dir
  # Audit log (issue #65). Events of severity `low` are not persisted; this
  # mapping keeps them visible in stdout for debugging.
  auditor:
    severityLogLevelMappings:
      low: info

integrations:
  github:
    - host: github.com
      # This is a Personal Access Token or PAT from GitHub. You can find out how to generate this token, and more information
      # about setting up the GitHub integration here: https://backstage.io/docs/integrations/github/locations#configuration
      token: ${GITHUB_TOKEN}
    ### Example for how to add your GitHub Enterprise instance using the API:
    # - host: ghe.example.net
    #   apiBaseUrl: https://ghe.example.net/api/v3
    #   token: ${GHE_TOKEN}
  bitbucketCloud:
    - username: ${BITBUCKET_USERNAME}
      appPassword: ${BITBUCKET_APP_PASSWORD}
  gitlab:
    # Token usado por catalog-backend (Bloque C) y por scaffolder-backend para
    # operaciones de lectura/escritura sobre repos del grupo `aragon-idp`.
    # Crear como Group Access Token (preferido) o Personal Access Token con
    # scopes: api, read_repository, write_repository.
    # Rotación documentada en docs/Implementación/Realm Keycloak - Autenticación Aragón IDP.md §9.
    - host: gitlab.com
      token: ${GITLAB_TOKEN}

proxy:
  ### Example for how to add a proxy endpoint for the frontend.
  ### A typical reason to do this is to handle HTTPS and CORS for internal services.
  # endpoints:
  #   '/test':
  #     target: 'https://example.com'
  #     changeOrigin: true

# Reference documentation http://backstage.io/docs/features/techdocs/configuration
# Note: After experimenting with basic setup, use CI/CD to generate docs
# and an external cloud storage when deploying TechDocs for production use-case.
# https://backstage.io/docs/features/techdocs/how-to-guides#how-to-migrate-from-techdocs-basic-to-recommended-deployment-approach
techdocs:
  builder: 'external'
  generator:
    runIn: 'docker'
  publisher:
    type: 'awsS3'
    awsS3:
      bucketName: ${TECHDOCS_S3_BUCKET_NAME}
      endpoint: ${TECHDOCS_S3_ENDPOINT}
      s3ForcePathStyle: true
      credentials:
        accessKeyId: ${TECHDOCS_S3_ACCESS_KEY_ID}
        secretAccessKey: ${TECHDOCS_S3_SECRET_ACCESS_KEY}

auth:
  environment: development
  # OIDC Authorization Code + PKCE necesita session middleware en el backend para
  # preservar state/nonce entre el redirect al IdP y el callback.
  session:
    secret: ${AUTH_SESSION_SECRET}
  # see https://backstage.io/docs/auth/ to learn about auth providers
  providers:
    # See https://backstage.io/docs/auth/guest/provider
    guest: {}
    oidc:
      development:
        metadataUrl: ${AUTH_OIDC_METADATA_URL}
        clientId: ${AUTH_OIDC_CLIENT_ID}
        clientSecret: ${AUTH_OIDC_CLIENT_SECRET}
        prompt: auto

scaffolder:
  # see https://backstage.io/docs/features/software-templates/configuration for software template options

catalog:
  orphanStrategy: delete
  import:
    entityFilename: catalog-info.yaml
    pullRequestBranchName: backstage-integration
  # RC-KIND-01 / RC-KIND-02: el prototipo gestiona exactamente estos 6 kinds
  # (Component, API, System, User, Group, Template). Resource y Domain quedan
  # fuera de scope. Location es necesario por el mecanismo interno de carga.
  rules:
    - allow: [Component, API, System, User, Group, Template, Location]
  providers:
    # RC-DISC-01: descubrimiento automático sobre el grupo aragon-idp de
    # GitLab.com. Cualquier repo del grupo (incluido el del propio IDP — ver
    # RC-SEED-04) con un catalog-info.yaml en la raíz se ingesta sin
    # intervención del platform-admin. El token GITLAB_TOKEN debe tener scope
    # `read_api` y acceso al grupo (Group Access Token preferido).
    gitlab:
      aragonIdp:
        host: gitlab.com
        group: aragon-idp
        branch: main
        catalogFile: catalog-info.yaml
        schedule:
          frequency: { minutes: 30 }
          timeout: { minutes: 3 }
    keycloakOrg:
      default:
        baseUrl: http://localhost:8081
        realm: aragon-idp
        loginRealm: aragon-idp
        clientId: backstage-sync
        clientSecret: ${KEYCLOAK_BACKSTAGE_SYNC_SECRET}
        schedule:
          frequency: { minutes: 30 }
          timeout: { minutes: 3 }
          initialDelay: { seconds: 15 }
  locations:
    # Seed del prototipo (RC-SEED-01 / RC-SEED-05): System portal-ciudadano,
    # sus dos Components (frontend + backend) y las 3 APIs externas de
    # Aragón Open Data. Las paths son relativas al cwd del backend
    # (typically `packages/backend`).
    - type: file
      target: ../../catalog/seed/system-portal-ciudadano.yaml

    - type: file
      target: ../../catalog/seed/apis-opendata.yaml

    - type: file
      target: ../../catalog/seed/system-aragon-idp.yaml

    # Jerarquia organizativa AST de 4 niveles (ADR-0002 / ADR-0005 / ADR-0007):
    # 8 Group estaticos (organization, business-unit, product-area). Los team
    # del nivel 4 siguen viniendo de Keycloak; las relaciones childOf/parentOf
    # se derivan de los spec.children declarados en los padres.
    - type: file
      target: ../../catalog/seed/org-ast.yaml

    - type: file
      target: ../../catalog-info.yaml

    # Templates del scaffolder (kind explícito para no entrar en conflicto
    # con `catalog.rules` global).
    - type: file
      target: ../../examples/templates/backend-spring-boot/template.yaml
      rules:
        - allow: [Template]

    - type: file
      target: ../../examples/templates/frontend-angular-desy/template.yaml
      rules:
        - allow: [Template]

    # Identidad (User/Group) viene de Keycloak via catalog.providers.keycloakOrg.
    # examples/org.yaml queda como referencia histórica pero no se carga.

    ## Uncomment these lines to add more example data
    # - type: url
    #   target: https://github.com/backstage/backstage/blob/master/packages/catalog-model/examples/all.yaml

    ## Uncomment these lines to add an example org
    # - type: url
    #   target: https://github.com/backstage/backstage/blob/master/packages/catalog-model/examples/acme-corp.yaml
    #   rules:
    #     - allow: [User, Group]

kubernetes:
  # see https://backstage.io/docs/features/kubernetes/configuration for kubernetes configuration options

# see https://backstage.io/docs/permissions/getting-started for more on the permission framework
permission:
  # setting this to `false` will disable permissions
  enabled: true
